<section class="section more-proyects" id='moreproyects'>
    <div class="container">
        <div class="section-box">
            <div>
                <h3 class="section-title">
                    <span class='n-section-title'>03.</span> {{"OtherProjects.Title" | translate}}
                </h3>
            </div>

            <div class="mt-5">
                <div class="row p-0">
                    <div *ngFor='let project of "OtherProjects.Projects" | translate; let i = index'
                        (click)="redirect(project['demoLink'], $event)"
                        class="col-12 col-md-6 col-lg-6 col-xl-4 proyect-col" data-aos="fade-up"
                        [attr.data-aos-duration]="1000">

                        <div class="more-proyect-box">
                            <div class="main-content">
                                <div class="header-project">
                                    <div class="icon-box">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path
                                                d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                                            <polyline points="14 2 14 8 20 8" />
                                            <line x1="16" y1="13" x2="8" y2="13" />
                                            <line x1="16" y1="17" x2="8" y2="17" />
                                            <line x1="10" y1="9" x2="8" y2="9" />
                                        </svg>
                                    </div>
                                    <h5 class="other-proyect-title" [attr.title]="project.Title">
                                        {{project.Title}}
                                    </h5>
                                </div>

                                <p class="other-proyect-description">
                                    {{project.Description}}
                                </p>
                            </div>

                            <div class="bottom-content mt-3">
                                <ul class="more-proyects-skills">
                                    <li *ngFor='let technology of project.Technologies'>
                                        <span class="underline">{{technology}}</span>
                                    </li>
                                </ul>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
